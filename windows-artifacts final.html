<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows Forensic Artifacts — Cheat Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --green: #00ff88;
    --yellow: #ffd60a;
    --red: #ff4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,16,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }

  #searchInput {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px 10px 40px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
  }

  #searchInput::placeholder { color: var(--muted); }

  .sort-wrap {
    position: relative;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .sort-icon {
    position: absolute;
    left: 10px;
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
    z-index: 1;
  }
  #sortSelect {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px 8px 28px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    min-width: 160px;
    transition: border-color 0.2s;
  }
  #sortSelect:focus { border-color: var(--accent); }
  #sortSelect option { background: var(--surface2); color: var(--text); }

  .stats {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .stats span { color: var(--accent); font-weight: 700; }

  /* Filter tabs */
  .filters {
    padding: 12px 32px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: rgba(10,12,16,0.8);
    position: sticky;
    top: 73px;
    z-index: 99;
    backdrop-filter: blur(20px);
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  /* Main layout */
  .main {
    position: relative;
    z-index: 1;
    padding: 24px 32px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* Artifact cards grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.3s ease both;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: rgba(0,229,255,0.3);
    box-shadow: 0 8px 32px rgba(0,229,255,0.05);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .card-icon {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .card-meta {
    flex: 1;
    min-width: 0;
  }

  .card-name {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 2px;
  }

  .card-category {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.7;
  }

  .card-body { padding: 16px 20px; }

  .card-desc {
    font-size: 13px;
    line-height: 1.7;
    color: #cbd5e1;
    margin-bottom: 14px;
  }

  .info-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .info-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .info-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    width: 70px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .info-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.5;
    background: rgba(0,229,255,0.05);
    padding: 4px 8px;
    border-radius: 4px;
    border-left: 2px solid var(--accent);
    flex: 1;
  }

  .info-value.multi {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-value.multi span {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 0;
    border-bottom: 1px solid rgba(0,229,255,0.1);
  }
  .info-value.multi span:last-child { border: none; }

  .path-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(0,229,255,0.08);
  }
  .path-row:last-child { border: none; }

  .path-text { flex: 1; word-break: break-all; }

  .copy-btn {
    flex-shrink: 0;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    line-height: 1.4;
    font-family: var(--mono);
  }
  .copy-btn:hover { background: rgba(0,229,255,0.2); color: #fff; }
  .copy-btn.copied { background: rgba(0,255,136,0.15); border-color: rgba(0,255,136,0.4); color: var(--green); }

  /* Command block */
  .cmd-list { display: flex; flex-direction: column; gap: 8px; }
  .cmd-row { display: flex; flex-direction: column; gap: 3px; }
  .cmd-label {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
  }
  .cmd-block {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,214,10,0.15);
    border-left: 3px solid rgba(255,214,10,0.5);
    border-radius: 0 5px 5px 0;
    padding: 7px 10px;
  }
  .cmd-block code {
    font-family: var(--mono);
    font-size: 11px;
    color: #ffd60a;
    flex: 1;
    white-space: nowrap;
    overflow-x: auto;
    line-height: 1.5;
  }

  .uses-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .use-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: #a78bfa;
    white-space: nowrap;
  }

  /* OS badges */
  .os-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .os-badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(255,214,10,0.1);
    border: 1px solid rgba(255,214,10,0.2);
    color: var(--yellow);
    letter-spacing: 0.5px;
  }

  /* Expand button */
  .expand-btn {
    width: 100%;
    padding: 10px;
    background: var(--surface2);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: color 0.2s, background 0.2s;
  }

  .expand-btn:hover { color: var(--accent); background: rgba(0,229,255,0.05); }

  .extra-details {
    display: none;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .extra-details.open { display: block; }

  .extra-section {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .extra-section:last-child { border-bottom: none; }

  .extra-title {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .extra-text {
    font-size: 12.5px;
    line-height: 1.8;
    color: #cbd5e1;
  }

  .extra-text p { margin-bottom: 8px; }

  /* How To Investigate steps */
  .howto-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 7px;
    counter-reset: howto-counter;
  }

  .howto-list li {
    counter-increment: howto-counter;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 12.5px;
    line-height: 1.65;
    color: #cbd5e1;
  }

  .howto-list li::before {
    content: counter(howto-counter);
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.22);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    min-width: 22px;
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .howto-list li b { color: #cbd5e1; font-weight: 600; }

  .cmd {
    display: inline-block;
    background: rgba(0,0,0,0.5);
    border: 1px solid #252a38;
    color: #ffd60a;
    font-family: var(--mono);
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
    word-break: break-all;
  }

  .normal { color: #34d399; font-weight: 600; }
  .suspicious { color: #f87171; font-weight: 600; }
  .extra-text p:last-child { margin-bottom: 0; }

  .example-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(0,229,255,0.15);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: #c8e6f0;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .example-label {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 6px;
    opacity: 0.8;
  }

  .tool-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }

  .tool-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.2);
    color: var(--green);
  }

  .fv-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 5px;
    flex-shrink: 0;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .fv-critical { background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.4); color: #ff6b6b; }
  .fv-high     { background: rgba(255,214,10,0.12); border: 1px solid rgba(255,214,10,0.35); color: #ffd60a; }
  .fv-medium   { background: rgba(0,255,136,0.1);  border: 1px solid rgba(0,255,136,0.25); color: #00ff88; }
  .fv-low      { background: rgba(100,116,139,0.15); border: 1px solid rgba(100,116,139,0.3); color: #cbd5e1; }

  .shortcut-strip {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    padding: 10px 32px;
    background: rgba(0,229,255,0.03);
    border-bottom: 1px solid var(--border);
  }
  .shortcut-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .shortcut-item {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 4px;
    background: rgba(0,229,255,0.06);
    border: 1px solid rgba(0,229,255,0.2);
    color: var(--accent);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .shortcut-item:hover { background: rgba(0,229,255,0.15); color: #fff; }

  .tagline-strip {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    padding: 7px 20px;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid var(--border);
    font-style: italic;
  }

  /* No results */
  .no-results {
    display: none;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 14px;
  }

  .no-results .nr-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* highlight match */
  .highlight { background: rgba(255,214,10,0.25); color: var(--yellow); border-radius: 2px; }

  /* ── SIDEBAR ── */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .sidebar-overlay.open { display: block; }

  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 280px;
    background: #0d0f16;
    border-right: 1px solid var(--border);
    z-index: 300;
    transform: translateX(-100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar.open { transform: translateX(0); }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .sidebar-title {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .sidebar-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .sidebar-close:hover { color: #fff; border-color: #fff; }

  .sidebar-section {
    padding: 14px 16px 6px;
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 20px;
  }
  .sidebar-nav::-webkit-scrollbar { width: 3px; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    margin-bottom: 2px;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); }
  .nav-item.active { background: rgba(0,229,255,0.08); }
  .nav-item.active .nav-label { color: var(--accent); }

  .nav-icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
  .nav-label {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    color: #cbd5e1;
    flex: 1;
  }
  .nav-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 10px;
  }

  .nav-divider {
    height: 1px;
    background: var(--border);
    margin: 10px 12px;
  }

  /* page links (other tools) */
  .nav-page-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 7px;
    cursor: pointer;
    border: 1px solid var(--border);
    margin: 4px 0;
    transition: all 0.2s;
    text-decoration: none;
  }
  .nav-page-item:hover { border-color: var(--accent); background: rgba(0,229,255,0.05); }
  .nav-page-label {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }
  .nav-page-sub {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    margin-top: 1px;
  }
  .nav-page-arrow { margin-left: auto; color: var(--muted); font-size: 12px; }
  .nav-page-item:hover .nav-page-arrow { color: var(--accent); }

  /* hamburger btn */
  .sidebar-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; gap: 7px;
    font-family: var(--mono);
    font-size: 12px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .sidebar-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── TABLET (768px - 1024px) ── */
  @media (max-width: 1024px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
    .header { padding: 14px 20px; gap: 14px; }
    .main { padding: 16px 20px 40px; }
    .filters { padding: 10px 20px; }
  }

  /* ── LARGE PHONE (480px - 768px) ── */
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }

      "IE11: %USERPROFILE%\\AppData\\Local\\Microsoft\\Windows\\INetCookies",
      "Edge Legacy: %USERPROFILE%\\AppData\\Local\\Packages\\microsoft.microsoftedge_<APPID>\\AC\\MicrosoftEdge\\Cookies",
      "Firefox Win7/8/10: %USERPROFILE%\\AppData\\Roaming\\Mozilla\\Firefox\\Profiles\\<profile>\\cookies.sqlite",
      "Chrome Win7/8/10: %USERPROFILE%\\AppData\\Local\\Google\\Chrome\\User Data\\Default\\Cookies"
    ],
    uses: ["Website visit evidence", "User account login token recovery", "Session reconstruction", "Tracking cookie analysis", "Identify authenticated sessions", "Prove access to specific web services"],
    os: ["Windows XP", "Vista", "7", "8", "10", "11"],
    tools: ["Nirsoft IECookiesView", "DB Browser for SQLite", "Autopsy", "Hindsight", "MZCacheView"],
    notes: "IE stores individual text files per domain -- easy to parse manually. IE10/11 uses the WebCache ESE database. Firefox and Chrome both use SQLite. Chrome Cookies key columns: host_key, name, value, creation_utc, last_access_utc, expires_utc, httponly, secure. Firefox moz_cookies key columns: host, name, value, creationTime, lastAccessed, expiry, isHttpOnly, isSecure. Session cookies with no expiry indicate active sessions. HTTPOnly cookies cannot be read by JavaScript. Look for authentication tokens such as sessionid, auth_token, PHPSESSID which can indicate account access.",
    commands: [
      { label: "Chrome -- list all cookies", cmd: "sqlite3 \"%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\\Cookies\" \"SELECT host_key, name, value, datetime(creation_utc/1000000-11644473600,'unixepoch') as created FROM cookies ORDER BY creation_utc DESC\"" },
      { label: "Firefox -- list all cookies", cmd: "sqlite3 \"%APPDATA%\\Mozilla\\Firefox\\Profiles\\<profile>\\cookies.sqlite\" \"SELECT host, name, value, datetime(creationTime/1000000,'unixepoch') as created FROM moz_cookies\"" },
      { label: "IE -- list cookie files", cmd: "dir /b \"%APPDATA%\\Microsoft\\Windows\\Cookies\\\"" },
      { label: "Parse IE cookies with Nirsoft", cmd: "IECookiesView.exe /scomma ie_cookies.csv" },
      { label: "Parse Chrome with Hindsight", cmd: "hindsight.py -i \"%LOCALAPPDATA%\\Google\\Chrome\\User Data\\Default\" -o chrome_output" }
    ],
    eventIds: []
  }
];

// ─── Category colors
const catColors = {
  "Registry": "#ff6b35",
  "Event Logs": "#00e5ff",
  "File System": "#7c3aed",
  "Browser": "#00ff88",
  "Network": "#ffd60a",
  "Execution": "#ff4444",
  "Memory": "#a78bfa",
  "User Activity": "#fb923c",
  "USB & Devices": "#22d3ee",
  "Persistence": "#f472b6",
  "Cloud & Sync": "#38bdf8",
  "Misc": "#94a3b8",
  "LOLBAS": "#e879f9",
  "Credentials": "#f59e0b",
  "Anti-Forensics": "#ef4444",
  "Lateral Movement": "#10b981",
  "Email": "#0ea5e9",
  "Active Directory": "#8b5cf6",
  "Account Usage": "#f472b6",
  "Browser Deep Dive": "#4ade80"
};

const catIcons = {
  "Registry": "📋", "Event Logs": "📜", "File System": "🗂️",
  "Browser": "🌐", "Network": "📡", "Execution": "▶️",
  "Memory": "🧠", "User Activity": "👤", "USB & Devices": "🔌",
  "Persistence": "🔒", "Cloud & Sync": "☁️", "Misc": "🔧",
  "LOLBAS": "🐉", "Credentials": "🔑", "Anti-Forensics": "🧹",
  "Lateral Movement": "🔀", "Email": "📧", "Active Directory": "🏛️",
  "Registry MRU": "📋", "Browser Deep Dive": "🌐",
  "Account Usage": "🔐"
};

// ─── State
let activeFilter = "All";
let searchQuery = "";
let sortBy = "default"; // default | name-asc | name-desc | fv-high | fv-low | category

// ─── Init
function init() {
  const grid = document.getElementById("artifactGrid");
  const filterBar = document.getElementById("filterBar");
  document.getElementById("countTotal").textContent = ARTIFACTS.length;

  // Build filter buttons
  const categories = ["All", ...new Set(ARTIFACTS.map(a => a.category))];
  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (cat === "All" ? " active" : "");
    btn.textContent = cat === "All" ? "All Artifacts" : `${catIcons[cat] || ""} ${cat}`;
    btn.addEventListener("click", () => {
      activeFilter = cat;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderCards();
    });
    filterBar.appendChild(btn);
  });

  // Search
  document.getElementById("searchInput").addEventListener("input", e => {
    searchQuery = e.target.value.toLowerCase().trim();
    renderCards();
  });

  document.getElementById("sortSelect").addEventListener("change", e => {
    sortBy = e.target.value;
    renderCards();
  });

  renderCards();
}

function highlight(text, query) {
  if (!query) return escHTML(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHTML(text).replace(new RegExp(`(${escaped})`, 'gi'), '<span class="highlight">$1</span>');
}

function escHTML(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function matchesSearch(artifact, q) {
  if (!q) return true;
  const searchable = [
    artifact.name, artifact.category, artifact.definition,
    ...artifact.paths, ...artifact.uses, ...artifact.os,
    artifact.notes, ...(artifact.eventIds || []), ...(artifact.tools || [])
  ].join(" ").toLowerCase();
  return q.split(" ").every(word => searchable.includes(word));
}

function renderCards() {
  const grid = document.getElementById("artifactGrid");
  const noResults = document.getElementById("noResults");
  grid.innerHTML = "";

  const filtered = ARTIFACTS.filter(a => {
    const catOk = activeFilter === "All" || a.category === activeFilter;
    const searchOk = matchesSearch(a, searchQuery);
    return catOk && searchOk;
  });

  // ── Sort
  const fvOrder = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
  if (sortBy === "name-asc")   filtered.sort((a,b) => a.name.localeCompare(b.name));
  if (sortBy === "name-desc")  filtered.sort((a,b) => b.name.localeCompare(a.name));
  if (sortBy === "fv-high")    filtered.sort((a,b) => (fvOrder[a.forensicValue]??9) - (fvOrder[b.forensicValue]??9));
  if (sortBy === "fv-low")     filtered.sort((a,b) => (fvOrder[b.forensicValue]??9) - (fvOrder[a.forensicValue]??9));
  if (sortBy === "category")   filtered.sort((a,b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name));

  document.getElementById("countShown").textContent = filtered.length;

  if (filtered.length === 0) {
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  const fvMap = {
    "CRITICAL": { cls: "fv-critical", label: "🔴 Must Check First" },
    "HIGH":     { cls: "fv-high",     label: "🟡 Very Important" },
    "MEDIUM":   { cls: "fv-medium",   label: "🟢 Good to Check" },
    "LOW":      { cls: "fv-low",      label: "⚪ Supplementary" }
  };

  filtered.forEach((a, idx) => {
    const color = catColors[a.category] || "#888";
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.min(idx * 0.04, 0.5)}s`;

    const fv = fvMap[a.forensicValue] || fvMap["LOW"];
    const pathsHTML = a.paths.map(p => {
      const encoded = btoa(unescape(encodeURIComponent(p)));
      return `<span class="path-row">
        <span class="path-text">${highlight(p, searchQuery)}</span>
        <button class="copy-btn" onclick="copyPath(this,'${encoded}')" title="Copy path">⎘</button>
      </span>`;
    }).join("");
    const usesHTML = a.uses.map(u => `<span class="use-tag">${highlight(u, searchQuery)}</span>`).join("");
    const toolsHTML = a.tools.map(t => `<span class="tool-tag">${escHTML(t)}</span>`).join("");
    const osHTML = a.os.map(o => `<span class="os-badge">${escHTML(o)}</span>`).join("");
    const eidsHTML = a.eventIds && a.eventIds.length
      ? a.eventIds.map(e => `<span class="use-tag" style="background:rgba(255,68,68,0.1);border-color:rgba(255,68,68,0.25);color:#f87171;">${escHTML(e)}</span>`).join("")
      : '';

    // Build notes paragraphs
    const notesContent = Array.isArray(a.notes)
      ? a.notes.map(n => `<p>${highlight(n, searchQuery)}</p>`).join("")
      : `<p>${highlight(a.notes || "", searchQuery)}</p>`;

    const commandsBlock = a.commands && a.commands.length ? `
      <div class="extra-section">
        <div class="extra-title" style="color:#ffd60a;">⌨️ Commands / Queries</div>
        <div class="cmd-list">
          ${a.commands.map(c => {
            const encCmd = btoa(encodeURIComponent(c.cmd));
            return `<div class="cmd-row">
              <div class="cmd-label">${escHTML(c.label)}</div>
              <div class="cmd-block">
                <code>${escHTML(c.cmd)}</code>
                <button class="copy-btn" onclick="copyCmd(this,'${encCmd}')" title="Copy command">⎘</button>
              </div>
            </div>`;
          }).join("")}
        </div>
      </div>` : "";

    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon" style="background:${color}22; color:${color};">${a.icon}</div>
        <div class="card-meta">
          <div class="card-name">${highlight(a.name, searchQuery)}</div>
          <div class="card-category" style="color:${color};">${highlight(a.category, searchQuery)}</div>
        </div>
        <div class="fv-badge ${fv.cls}" title="Forensic Importance">${fv.label}</div>
      </div>
      <div class="card-body">
        <div class="card-desc">${highlight(a.definition, searchQuery)}</div>
        <div class="info-row">
          <div class="info-item">
            <span class="info-label">Path(s)</span>
            <div class="info-value multi">${pathsHTML}</div>
          </div>
        </div>
        <div class="uses-list" style="margin-top:12px;"><div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);width:100%;margin-bottom:4px;">🎯 Use Cases — why investigate this artifact</div>${usesHTML}</div>
        ${eidsHTML ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;align-items:center;gap:6px;"><span style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);">Event IDs:</span>${eidsHTML}</div>` : ''}
        ${osHTML ? `<div class="os-badges"><div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);width:100%;margin-bottom:4px;">💻 OS Versions — which Windows versions have this</div>${osHTML}</div>` : ''}
      </div>
      <button class="expand-btn" onclick="toggleExtra(this)">▼ Expand Details</button>
      <div class="extra-details">
        <div class="extra-section">
          <div class="extra-title" style="color:#a78bfa;">📖 Forensic Notes</div>
          <div class="extra-text">${notesContent}</div>
        </div>
        ${commandsBlock}
        <div class="extra-section">
          <div class="extra-title" style="color:#00ff88;">🛠️ Analysis Tools</div>
          <div class="tool-list">${toolsHTML}</div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggleExtra(btn) {
  const extra = btn.nextElementSibling;
  const isOpen = extra.classList.toggle("open");
  btn.textContent = isOpen ? "▲ Collapse Details" : "▼ Expand: Notes, Examples & Tools";
}

function copyPath(btn, encoded) {
  const path = decodeURIComponent(escape(atob(encoded)));
  navigator.clipboard.writeText(path).then(() => {
    btn.textContent = "✓";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "⎘"; btn.classList.remove("copied"); }, 1500);
  }).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = path;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    btn.textContent = "✓";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "⎘"; btn.classList.remove("copied"); }, 1500);
  });
}

function copyCmd(btn, encoded) {
  const cmd = decodeURIComponent(atob(encoded));
  navigator.clipboard.writeText(cmd).then(() => {
    btn.textContent = "✓";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "⎘"; btn.classList.remove("copied"); }, 1500);
  }).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = cmd;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    btn.textContent = "✓";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "⎘"; btn.classList.remove("copied"); }, 1500);
  });
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function buildSidebarCats() {
  const container = document.getElementById('sidebarCats');
  const categories = ["All", ...new Set(ARTIFACTS.map(a => a.category))];
  categories.forEach(cat => {
    const count = cat === "All" ? ARTIFACTS.length : ARTIFACTS.filter(a => a.category === cat).length;
    const item = document.createElement('div');
    item.className = 'nav-item' + (cat === 'All' ? ' active' : '');
    item.innerHTML = `
      <span class="nav-icon">${cat === 'All' ? '🗂️' : (catIcons[cat] || '•')}</span>
      <span class="nav-label">${cat === 'All' ? 'All Artifacts' : cat}</span>
      <span class="nav-count">${count}</span>`;
    item.addEventListener('click', () => {
      activeFilter = cat;
      // sync filter bar
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.filter-btn').forEach(b => {
        if (b.textContent.includes(cat === 'All' ? 'All Artifacts' : cat)) b.classList.add('active');
      });
      // sync sidebar
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      renderCards();
      closeSidebar();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    container.appendChild(item);
  });
}

init();
buildSidebarCats();
</script>
